<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Dreadnought: capital battleship — slate-steel hull / navy armor / amber windows -->
    <linearGradient id="drHull" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#90a4ae"/>
      <stop offset="40%"  stop-color="#607d8b"/>
      <stop offset="100%" stop-color="#2e3c44"/>
    </linearGradient>
    <linearGradient id="drHullDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#1c272d"/>
    </linearGradient>
    <linearGradient id="drArmor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#34495e"/>
      <stop offset="100%" stop-color="#11181f"/>
    </linearGradient>
    <linearGradient id="drSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#cfd8dc" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#607d8b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1216" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="drEng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#ffd54f"/>
      <stop offset="65%"  stop-color="#fb8c00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <filter id="drBlur"><feGaussianBlur stdDeviation="4.5"/></filter>
    <filter id="drGlow"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Quad main engine plumes -->
  <ellipse cx="10" cy="44" rx="22" ry="8" fill="url(#drEng)" filter="url(#drBlur)"/>
  <ellipse cx="10" cy="60" rx="24" ry="9" fill="url(#drEng)" filter="url(#drBlur)"/>
  <ellipse cx="10" cy="76" rx="24" ry="9" fill="url(#drEng)" filter="url(#drBlur)"/>
  <ellipse cx="10" cy="92" rx="22" ry="8" fill="url(#drEng)" filter="url(#drBlur)"/>

  <!-- Massive slab hull -->
  <polygon points="26,32 200,32 232,52 248,64 232,76 200,96 26,96" fill="url(#drHull)" stroke="#455a64" stroke-width="0.6"/>
  <polygon points="26,32 200,32 232,52 248,64 232,76 200,96 26,96" fill="url(#drSheen)"/>

  <!-- Lower armor belt -->
  <polygon points="26,80 200,80 232,76 200,96 26,96" fill="url(#drArmor)"/>
  <line x1="26" y1="80" x2="218" y2="80" stroke="#11181f" stroke-width="1"/>
  <!-- Upper armor belt -->
  <polygon points="26,32 200,32 232,52 200,48 26,48" fill="url(#drHullDark)"/>
  <line x1="26" y1="48" x2="220" y2="48" stroke="#1c272d" stroke-width="0.8"/>

  <!-- Heavy armor segment plates (vertical seams) -->
  <line x1="60"  y1="32" x2="60"  y2="96" stroke="#1c272d" stroke-width="1" opacity="0.6"/>
  <line x1="94"  y1="32" x2="94"  y2="96" stroke="#1c272d" stroke-width="1" opacity="0.6"/>
  <line x1="128" y1="32" x2="128" y2="96" stroke="#1c272d" stroke-width="1" opacity="0.6"/>
  <line x1="162" y1="32" x2="162" y2="96" stroke="#1c272d" stroke-width="1" opacity="0.6"/>
  <line x1="196" y1="32" x2="196" y2="96" stroke="#1c272d" stroke-width="1" opacity="0.5"/>

  <!-- Row of amber viewport windows (crew decks) -->
  <g filter="url(#drGlow)">
    <rect x="44"  y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="58"  y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="72"  y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="86"  y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="100" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="114" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="128" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="142" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="156" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
    <rect x="170" y="58" width="5" height="4" rx="1" fill="url(#drAmber)"/>
  </g>
  <!-- Round portholes (lower deck) -->
  <g filter="url(#drGlow)">
    <circle cx="50"  cy="88" r="2" fill="#ffca28"/>
    <circle cx="74"  cy="88" r="2" fill="#ffca28"/>
    <circle cx="98"  cy="88" r="2" fill="#ffca28"/>
    <circle cx="122" cy="88" r="2" fill="#ffca28"/>
    <circle cx="146" cy="88" r="2" fill="#ffca28"/>
    <circle cx="170" cy="88" r="2" fill="#ffca28"/>
  </g>

  <!-- Command bridge tower (top, near front) -->
  <polygon points="150,32 188,32 184,16 158,16" fill="url(#drHullDark)" stroke="#455a64" stroke-width="0.6"/>
  <rect x="160" y="20" width="20" height="5" rx="1" fill="url(#drAmber)" filter="url(#drGlow)"/>
  <line x1="168" y1="16" x2="168" y2="6" stroke="#90a4ae" stroke-width="1"/>
  <circle cx="168" cy="5" r="1.6" fill="#ff5252" filter="url(#drGlow)"/>

  <!-- Sensor mast (rear top) -->
  <line x1="48" y1="32" x2="48" y2="14" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="42" y1="20" x2="54" y2="20" stroke="#90a4ae" stroke-width="0.8"/>
  <line x1="44" y1="16" x2="52" y2="16" stroke="#90a4ae" stroke-width="0.8"/>
  <circle cx="48" cy="13" r="1.6" fill="#76ff03" filter="url(#drGlow)"/>

  <!-- Nose ram / sharp prow -->
  <polygon points="232,52 248,64 232,76" fill="url(#drHullDark)" stroke="#11181f" stroke-width="0.6"/>
  <polygon points="240,60 252,64 240,68" fill="#90a4ae"/>

  <!-- Quad engine nozzles -->
  <g>
    <rect x="14" y="38" width="16" height="12" rx="2" fill="#11181f" stroke="#455a64" stroke-width="1"/>
    <rect x="14" y="54" width="16" height="12" rx="2" fill="#11181f" stroke="#455a64" stroke-width="1"/>
    <rect x="14" y="70" width="16" height="12" rx="2" fill="#11181f" stroke="#455a64" stroke-width="1"/>
    <rect x="14" y="86" width="16" height="12" rx="2" fill="#11181f" stroke="#455a64" stroke-width="1"/>
    <ellipse cx="22" cy="44" rx="5" ry="4" fill="url(#drEng)"/>
    <ellipse cx="22" cy="60" rx="5" ry="4" fill="url(#drEng)"/>
    <ellipse cx="22" cy="76" rx="5" ry="4" fill="url(#drEng)"/>
    <ellipse cx="22" cy="92" rx="5" ry="4" fill="url(#drEng)"/>
  </g>

  <!-- ── WEAPONS — dorsal & ventral main gun turrets ── -->
  <!-- Turret 1 (dorsal) -->
  <rect x="96" y="24" width="22" height="10" rx="2" fill="url(#drHullDark)" stroke="#11181f" stroke-width="0.6"/>
  <rect x="116" y="27" width="30" height="2.4" rx="0.8" fill="#90a4ae"/>
  <rect x="116" y="30" width="30" height="2.4" rx="0.8" fill="#607d8b"/>
  <rect x="144" y="27" width="3" height="2.4" fill="#ff8f00" filter="url(#drGlow)"/>
  <rect x="144" y="30" width="3" height="2.4" fill="#ff8f00" filter="url(#drGlow)"/>
  <!-- Turret 2 (ventral) -->
  <rect x="120" y="96" width="22" height="10" rx="2" fill="url(#drHullDark)" stroke="#11181f" stroke-width="0.6"/>
  <rect x="140" y="99"  width="34" height="2.6" rx="0.8" fill="#90a4ae"/>
  <rect x="140" y="102" width="34" height="2.6" rx="0.8" fill="#607d8b"/>
  <rect x="172" y="99"  width="3" height="2.6" fill="#ff8f00" filter="url(#drGlow)"/>
  <rect x="172" y="102" width="3" height="2.6" fill="#ff8f00" filter="url(#drGlow)"/>
  <!-- Forward broadside cannon battery -->
  <rect x="200" y="56" width="50" height="2.2" rx="0.7" fill="#78909c"/>
  <rect x="200" y="70" width="50" height="2.2" rx="0.7" fill="#78909c"/>
  <rect x="248" y="56" width="3" height="2.2" fill="#ff8f00" filter="url(#drGlow)"/>
  <rect x="248" y="70" width="3" height="2.2" fill="#ff8f00" filter="url(#drGlow)"/>
</svg>
