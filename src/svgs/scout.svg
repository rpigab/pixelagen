<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Scout: neon green / lime stealth look -->
    <linearGradient id="scoutHull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="40%" style="stop-color:#1b5e20"/>
      <stop offset="80%" style="stop-color:#388e3c"/>
      <stop offset="100%" style="stop-color:#76ff03"/>
    </linearGradient>
    <linearGradient id="scoutSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ccff90;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#388e3c;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0a1a0a;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="wingScout" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <!-- Ion engine: cyan-white burst -->
    <radialGradient id="ionGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="20%" style="stop-color:#00e5ff"/>
      <stop offset="60%" style="stop-color:#0097a7;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#004d40;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cockpitScout" cx="30%" cy="25%" r="75%">
      <stop offset="0%" style="stop-color:#f1f8e9"/>
      <stop offset="35%" style="stop-color:#aed581;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#33691e;stop-opacity:0.95"/>
    </radialGradient>
    <filter id="ionBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="scoutGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ion trail (long, behind ship) -->
  <ellipse cx="20" cy="64" rx="35" ry="8" fill="url(#ionGlow)" filter="url(#ionBlur)"/>

  <!-- Single swept-back wing (top) -->
  <polygon points="100,54 55,20 35,14 30,26 70,36 80,50" fill="url(#wingScout)" stroke="#33691e" stroke-width="0.5"/>
  <polygon points="100,54 55,20 35,14 30,26 70,36 80,50" fill="url(#scoutSheen)"/>

  <!-- Single swept-back wing (bottom) -->
  <polygon points="100,74 55,108 35,114 30,102 70,92 80,78" fill="url(#wingScout)" stroke="#33691e" stroke-width="0.5"/>
  <polygon points="100,74 55,108 35,114 30,102 70,92 80,78" fill="url(#scoutSheen)"/>

  <!-- Wing edge accent lines -->
  <line x1="35" y1="14" x2="95" y2="52" stroke="#76ff03" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="114" x2="95" y2="76" stroke="#76ff03" stroke-width="1" opacity="0.5"/>

  <!-- Slim main hull -->
  <polygon points="28,56 230,58 252,64 230,70 28,72" fill="url(#scoutHull)"/>
  <polygon points="28,56 230,58 252,64 230,70 28,72" fill="url(#scoutSheen)"/>

  <!-- Hull panel line -->
  <line x1="80" y1="60" x2="80" y2="68" stroke="#76ff03" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="60" x2="140" y2="68" stroke="#76ff03" stroke-width="0.8" opacity="0.4"/>
  <line x1="190" y1="60" x2="190" y2="68" stroke="#76ff03" stroke-width="0.8" opacity="0.4"/>

  <!-- Speed stripe -->
  <rect x="28" y="62" width="210" height="4" fill="#76ff03" opacity="0.2"/>

  <!-- Cockpit (elongated teardrop) -->
  <ellipse cx="220" cy="64" rx="24" ry="11" fill="url(#cockpitScout)" stroke="#76ff03" stroke-width="0.8"/>
  <ellipse cx="214" cy="60" rx="10" ry="5" fill="#f1f8e9" opacity="0.3"/>

  <!-- Sharp nose -->
  <polygon points="240,61 256,64 240,67" fill="#76ff03"/>

  <!-- Engine nozzle (single, centered) -->
  <rect x="20" y="58" width="18" height="12" rx="2" fill="#0a1a0a" stroke="#00897b" stroke-width="1"/>
  <ellipse cx="29" cy="64" rx="6" ry="5" fill="url(#ionGlow)"/>

  <!-- Wing tip lights -->
  <circle cx="36" cy="15" r="3" fill="#76ff03" filter="url(#scoutGlow)"/>
  <circle cx="36" cy="113" r="3" fill="#76ff03" filter="url(#scoutGlow)"/>
</svg>
