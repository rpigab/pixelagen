<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Shuttle-A: off-white body / slate-gray panels / deep orange engine -->
    <linearGradient id="shuttleHull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#eceff1"/>
      <stop offset="45%"  style="stop-color:#cfd8dc"/>
      <stop offset="100%" style="stop-color:#90a4ae"/>
    </linearGradient>
    <linearGradient id="shuttleSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.55"/>
      <stop offset="50%"  style="stop-color:#eceff1;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#37474f;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="slatePanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#78909c"/>
      <stop offset="100%" style="stop-color:#455a64"/>
    </linearGradient>
    <linearGradient id="noseTip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#b0bec5"/>
      <stop offset="100%" style="stop-color:#eceff1"/>
    </linearGradient>
    <radialGradient id="engGlowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#ffffff"/>
      <stop offset="25%"  style="stop-color:#ffcc02"/>
      <stop offset="60%"  style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#bf360c;stop-opacity:0"/>
    </radialGradient>
    <filter id="engBlurA"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="softA">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Engine plume -->
  <ellipse cx="14" cy="68" rx="28" ry="14" fill="url(#engGlowA)" filter="url(#engBlurA)"/>

  <!-- Main wedge hull (right-triangle: short left edge, long bottom) -->
  <polygon points="22,28  68,18  140,26  210,68  242,106  22,106"
           fill="url(#shuttleHull)" stroke="#90a4ae" stroke-width="0.5"/>
  <polygon points="22,28  68,18  140,26  210,68  242,106  22,106"
           fill="url(#shuttleSheen)"/>

  <!-- Belly / underside plate -->
  <rect x="22" y="102" width="222" height="6" rx="1" fill="url(#slatePanel)"/>

  <!-- Heat-tile texture lines (shuttle signature) -->
  <line x1="55"  y1="28" x2="55"  y2="106" stroke="#90a4ae" stroke-width="0.6" opacity="0.35"/>
  <line x1="90"  y1="26" x2="90"  y2="106" stroke="#90a4ae" stroke-width="0.6" opacity="0.35"/>
  <line x1="130" y1="27" x2="130" y2="106" stroke="#90a4ae" stroke-width="0.6" opacity="0.3"/>
  <line x1="170" y1="33" x2="170" y2="106" stroke="#90a4ae" stroke-width="0.6" opacity="0.25"/>
  <line x1="205" y1="44" x2="205" y2="106" stroke="#90a4ae" stroke-width="0.6" opacity="0.2"/>
  <!-- Horizontal tile grid -->
  <line x1="22" y1="55" x2="220" y2="80" stroke="#90a4ae" stroke-width="0.6" opacity="0.2"/>
  <line x1="22" y1="75" x2="220" y2="94" stroke="#90a4ae" stroke-width="0.6" opacity="0.2"/>

  <!-- Dorsal fuselage ridge (slate gray) -->
  <polygon points="22,28  68,18  140,26  210,68  200,72  130,32  65,24  22,36"
           fill="url(#slatePanel)" opacity="0.7"/>

  <!-- Cockpit window (forward of center, armored) -->
  <ellipse cx="186" cy="62" rx="18" ry="9" fill="#263238" stroke="#546e7a" stroke-width="1"/>
  <ellipse cx="183" cy="59" rx="9"  ry="5" fill="#78909c" opacity="0.5"/>

  <!-- Engine nozzle housing -->
  <rect x="14" y="52" width="18" height="32" rx="3" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <ellipse cx="23" cy="68" rx="9" ry="9" fill="url(#engGlowA)"/>
  <!-- Nozzle ring -->
  <ellipse cx="23" cy="68" rx="9" ry="9" fill="none" stroke="#ff6d00" stroke-width="1.5" opacity="0.8"/>

  <!-- Orange accent stripe (engine cowling) -->
  <rect x="14" y="50" width="20" height="4" rx="1" fill="#ff6d00" opacity="0.9"/>
  <rect x="14" y="82" width="20" height="4" rx="1" fill="#ff6d00" opacity="0.9"/>

  <!-- ── WEAPONS ─────────────────────────────────────────── -->
  <!-- Missile launcher pod (underside, left of nose) -->
  <rect x="120" y="100" width="52" height="10" rx="2" fill="#546e7a" stroke="#37474f" stroke-width="0.5"/>
  <!-- Missile tips (3, pointing right) -->
  <rect x="170" y="101" width="18" height="3" rx="1" fill="#ff6d00"/>
  <rect x="170" y="105" width="18" height="3" rx="1" fill="#ff6d00"/>
  <rect x="170" y="109" width="12" height="2" rx="1" fill="#ff6d00" opacity="0.7"/>
  <!-- Missile pod detail lines -->
  <line x1="140" y1="100" x2="140" y2="110" stroke="#455a64" stroke-width="0.8"/>
  <line x1="158" y1="100" x2="158" y2="110" stroke="#455a64" stroke-width="0.8"/>

  <!-- Dual machine gun barrels (nose lower edge) -->
  <rect x="210" y="101" width="46" height="3" rx="1" fill="#78909c"/>
  <rect x="210" y="105" width="46" height="3" rx="1" fill="#78909c"/>
  <!-- Gun muzzles (slightly darker) -->
  <rect x="252" y="101" width="4" height="3" rx="0.5" fill="#37474f"/>
  <rect x="252" y="105" width="4" height="3" rx="0.5" fill="#37474f"/>
  <!-- Gun mounting base -->
  <rect x="208" y="99" width="14" height="10" rx="1" fill="#546e7a" stroke="#37474f" stroke-width="0.5"/>
</svg>
