<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Warthog: blue-gray hull / military olive armor / danger red -->
    <linearGradient id="warthogHull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#607d8b"/>
      <stop offset="55%"  style="stop-color:#546e7a"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
    <linearGradient id="warthogSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#b0bec5;stop-opacity:0.45"/>
      <stop offset="55%"  style="stop-color:#607d8b;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#1c252a;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="olivePlate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#689f38"/>
      <stop offset="100%" style="stop-color:#33691e"/>
    </linearGradient>
    <linearGradient id="olivePlate2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#558b2f"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <radialGradient id="warthogEng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#ffffff"/>
      <stop offset="30%"  style="stop-color:#ffca28"/>
      <stop offset="65%"  style="stop-color:#ff8f00;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="warthogEng2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#ffffff"/>
      <stop offset="30%"  style="stop-color:#ffca28"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cockpitWT" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   style="stop-color:#e8f5e9"/>
      <stop offset="45%"  style="stop-color:#81c784;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:0.95"/>
    </radialGradient>
    <filter id="engBlurWT"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Dual engine plumes (this is a two-engine gunship) -->
  <ellipse cx="14" cy="52" rx="24" ry="12" fill="url(#warthogEng)"  filter="url(#engBlurWT)"/>
  <ellipse cx="14" cy="88" rx="24" ry="12" fill="url(#warthogEng2)" filter="url(#engBlurWT)"/>

  <!-- Chunky main wedge hull -->
  <polygon points="22,24  60,16  100,18  168,50  230,106  22,106"
           fill="url(#warthogHull)" stroke="#546e7a" stroke-width="0.5"/>
  <polygon points="22,24  60,16  100,18  168,50  230,106  22,106"
           fill="url(#warthogSheen)"/>

  <!-- Thick belly armor (olive) -->
  <polygon points="80,88  230,106  22,106  22,96  75,94" fill="url(#olivePlate2)"/>
  <line x1="22" y1="98" x2="228" y2="106" stroke="#33691e" stroke-width="0.8"/>

  <!-- Dorsal armor plating (olive) -->
  <polygon points="22,24  60,16  100,18  96,26  58,24  22,34" fill="url(#olivePlate)" opacity="0.85"/>
  <polygon points="100,18  168,50  158,56  92,26" fill="url(#olivePlate2)" opacity="0.7"/>

  <!-- Riveted panel lines (rugged look) -->
  <line x1="60"  y1="16"  x2="60"  y2="106" stroke="#b0bec5" stroke-width="0.7" opacity="0.3"/>
  <line x1="100" y1="18"  x2="100" y2="106" stroke="#b0bec5" stroke-width="0.7" opacity="0.3"/>
  <line x1="140" y1="26"  x2="140" y2="106" stroke="#b0bec5" stroke-width="0.7" opacity="0.25"/>
  <line x1="180" y1="42"  x2="180" y2="106" stroke="#b0bec5" stroke-width="0.7" opacity="0.2"/>

  <!-- Cockpit (bubble style, front of dorsal hump) -->
  <ellipse cx="155" cy="44" rx="20" ry="12" fill="url(#cockpitWT)" stroke="#546e7a" stroke-width="1"/>
  <ellipse cx="151" cy="40" rx="9"  ry="6"  fill="#e8f5e9" opacity="0.3"/>

  <!-- Dual engine nacelles (left side) -->
  <rect x="14" y="40" width="18" height="22" rx="3" fill="#263238" stroke="#455a64" stroke-width="1"/>
  <ellipse cx="23" cy="51" rx="8" ry="8" fill="url(#warthogEng)"/>
  <rect x="14" y="76" width="18" height="22" rx="3" fill="#263238" stroke="#455a64" stroke-width="1"/>
  <ellipse cx="23" cy="87" rx="8" ry="8" fill="url(#warthogEng2)"/>

  <!-- Red warning stripe on engine cowling -->
  <rect x="14" y="38" width="20" height="4" rx="1" fill="#c62828"/>
  <rect x="14" y="74" width="20" height="4" rx="1" fill="#c62828"/>

  <!-- ── WEAPONS ─────────────────────────────────────────── -->
  <!-- GAU-8 style rotary cannon (7-barrel, dominant forward weapon) -->
  <!-- Housing -->
  <rect x="175" y="98" width="30" height="14" rx="2" fill="#263238" stroke="#546e7a" stroke-width="0.8"/>
  <!-- 7 rotating barrels -->
  <rect x="202" y="99"  width="52" height="2.2" rx="0.8" fill="#607d8b"/>
  <rect x="202" y="101" width="54" height="2.2" rx="0.8" fill="#78909c"/>
  <rect x="202" y="103" width="52" height="2.2" rx="0.8" fill="#607d8b"/>
  <rect x="202" y="105" width="54" height="2.2" rx="0.8" fill="#78909c"/>
  <rect x="202" y="107" width="50" height="2.2" rx="0.8" fill="#607d8b"/>
  <rect x="202" y="109" width="52" height="2.2" rx="0.8" fill="#546e7a"/>
  <!-- Muzzle ends highlighted in red -->
  <rect x="252" y="99"  width="4" height="2.2" rx="0.5" fill="#c62828"/>
  <rect x="254" y="101" width="4" height="2.2" rx="0.5" fill="#c62828"/>
  <rect x="252" y="103" width="4" height="2.2" rx="0.5" fill="#c62828"/>
  <rect x="254" y="105" width="4" height="2.2" rx="0.5" fill="#c62828"/>
  <rect x="252" y="107" width="4" height="2.2" rx="0.5" fill="#b71c1c"/>

  <!-- Twin missile racks (upper nose area) -->
  <rect x="130" y="92" width="50" height="10" rx="2" fill="url(#olivePlate2)" stroke="#33691e" stroke-width="0.6"/>
  <!-- 4 missiles visible from side -->
  <rect x="178" y="93"  width="22" height="3" rx="1" fill="#37474f"/>
  <rect x="178" y="97"  width="22" height="3" rx="1" fill="#37474f"/>
  <!-- Red warhead tips -->
  <rect x="198" y="93"  width="6" height="3" rx="0.5" fill="#c62828"/>
  <rect x="198" y="97"  width="6" height="3" rx="0.5" fill="#c62828"/>
  <line x1="152" y1="92" x2="152" y2="102" stroke="#33691e" stroke-width="0.8"/>
  <line x1="168" y1="92" x2="168" y2="102" stroke="#33691e" stroke-width="0.8"/>
</svg>
