<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Interceptor: charcoal needle hull / crimson wings / gold afterburner -->
    <linearGradient id="intHull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#161a1d"/>
      <stop offset="40%"  stop-color="#37474f"/>
      <stop offset="78%"  stop-color="#607d8b"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
    <linearGradient id="intSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#eceff1" stop-opacity="0.6"/>
      <stop offset="45%"  stop-color="#607d8b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0d0f" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="intWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff5252"/>
      <stop offset="40%"  stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#3e0000"/>
    </linearGradient>
    <linearGradient id="intWing2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7f0000"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>
    <linearGradient id="intGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fff59d" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#ffca28"/>
      <stop offset="100%" stop-color="#fff8e1"/>
    </linearGradient>
    <radialGradient id="intBurn" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="22%"  stop-color="#ffd54f"/>
      <stop offset="58%"  stop-color="#ff5252" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b71c1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="intCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff5252" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="intCockpit" cx="35%" cy="26%" r="72%">
      <stop offset="0%"   stop-color="#fff8e1"/>
      <stop offset="45%"  stop-color="#ffca28" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4e342e" stop-opacity="0.95"/>
    </radialGradient>
    <filter id="intBlur"><feGaussianBlur stdDeviation="3.5"/></filter>
    <filter id="intGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Twin afterburner plumes -->
  <ellipse cx="10" cy="54" rx="30" ry="9" fill="url(#intBurn)" filter="url(#intBlur)"/>
  <ellipse cx="10" cy="74" rx="30" ry="9" fill="url(#intBurn)" filter="url(#intBlur)"/>

  <!-- Forward-swept canards (front control surfaces) -->
  <polygon points="186,52 226,30 244,28 238,40 200,56" fill="url(#intWing2)" stroke="#3e0000" stroke-width="0.5"/>
  <polygon points="186,76 226,98 244,100 238,88 200,72" fill="url(#intWing2)" stroke="#3e0000" stroke-width="0.5"/>
  <line x1="226" y1="30" x2="244" y2="28" stroke="#ffca28" stroke-width="1" opacity="0.7" filter="url(#intGlow)"/>
  <line x1="226" y1="98" x2="244" y2="100" stroke="#ffca28" stroke-width="1" opacity="0.7" filter="url(#intGlow)"/>

  <!-- Main swept-back wings -->
  <polygon points="96,56 40,18 18,12 24,30 70,46 84,58" fill="url(#intWing)" stroke="#3e0000" stroke-width="0.5"/>
  <polygon points="96,56 40,18 18,12 24,30 70,46 84,58" fill="url(#intSheen)"/>
  <polygon points="96,72 40,110 18,116 24,98 70,82 84,70" fill="url(#intWing)" stroke="#3e0000" stroke-width="0.5"/>
  <polygon points="96,72 40,110 18,116 24,98 70,82 84,70" fill="url(#intSheen)"/>
  <!-- Wing edge gold trim -->
  <line x1="18" y1="12" x2="92" y2="56" stroke="#ffca28" stroke-width="1.1" opacity="0.6" filter="url(#intGlow)"/>
  <line x1="18" y1="116" x2="92" y2="72" stroke="#ffca28" stroke-width="1.1" opacity="0.6" filter="url(#intGlow)"/>

  <!-- Slim needle fuselage -->
  <polygon points="22,54 170,58 252,64 170,70 22,74" fill="url(#intHull)"/>
  <polygon points="22,54 170,58 252,64 170,70 22,74" fill="url(#intSheen)"/>

  <!-- Dorsal spine ridge -->
  <polygon points="60,56 175,59 252,64 175,62 60,58" fill="#cfd8dc" opacity="0.25"/>

  <!-- Panel lines (dense) -->
  <line x1="60"  y1="55" x2="60"  y2="73" stroke="#b0bec5" stroke-width="0.5" opacity="0.35"/>
  <line x1="90"  y1="56" x2="90"  y2="72" stroke="#b0bec5" stroke-width="0.5" opacity="0.35"/>
  <line x1="120" y1="56" x2="120" y2="72" stroke="#b0bec5" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="57" x2="150" y2="71" stroke="#b0bec5" stroke-width="0.5" opacity="0.3"/>
  <line x1="180" y1="58" x2="180" y2="70" stroke="#b0bec5" stroke-width="0.5" opacity="0.25"/>

  <!-- Gold racing stripe -->
  <rect x="22" y="62" width="222" height="3.5" fill="url(#intGold)" opacity="0.85"/>

  <!-- Cockpit (slim, forward) -->
  <polygon points="184,58 214,62 210,68 184,70" fill="url(#intCockpit)" stroke="#ffca28" stroke-width="0.7"/>
  <line x1="186" y1="60" x2="208" y2="63.5" stroke="#fff8e1" stroke-width="0.5" opacity="0.5"/>

  <!-- Sharp nose tip -->
  <polygon points="244,61 256,64 244,67" fill="#fff8e1"/>

  <!-- Twin engine nozzles -->
  <rect x="14" y="48" width="16" height="12" rx="2" fill="#161a1d" stroke="#b71c1c" stroke-width="1"/>
  <rect x="14" y="68" width="16" height="12" rx="2" fill="#161a1d" stroke="#b71c1c" stroke-width="1"/>
  <ellipse cx="22" cy="54" rx="6" ry="5" fill="url(#intCore)"/>
  <ellipse cx="22" cy="74" rx="6" ry="5" fill="url(#intCore)"/>
  <!-- Gold cowling rings -->
  <rect x="14" y="46" width="18" height="2" rx="0.5" fill="#ffca28" opacity="0.85" filter="url(#intGlow)"/>
  <rect x="14" y="80" width="18" height="2" rx="0.5" fill="#ffca28" opacity="0.85" filter="url(#intGlow)"/>

  <!-- ── WEAPONS — nose-mounted twin pulse cannons ── -->
  <rect x="214" y="60" width="42" height="1.8" rx="0.6" fill="#cfd8dc"/>
  <rect x="214" y="66" width="42" height="1.8" rx="0.6" fill="#cfd8dc"/>
  <rect x="254" y="60" width="3" height="1.8" rx="0.4" fill="#ffca28" filter="url(#intGlow)"/>
  <rect x="254" y="66" width="3" height="1.8" rx="0.4" fill="#ffca28" filter="url(#intGlow)"/>
  <!-- Wing-root micro-missiles -->
  <rect x="96" y="50" width="20" height="3" rx="1" fill="#37474f"/>
  <rect x="114" y="50" width="5" height="3" rx="0.5" fill="#ff5252" filter="url(#intGlow)"/>
  <rect x="96" y="75" width="20" height="3" rx="1" fill="#37474f"/>
  <rect x="114" y="75" width="5" height="3" rx="0.5" fill="#ff5252" filter="url(#intGlow)"/>

  <!-- Running lights -->
  <circle cx="20" cy="16" r="2" fill="#ff5252" filter="url(#intGlow)"/>
  <circle cx="20" cy="112" r="2" fill="#76ff03" filter="url(#intGlow)"/>
</svg>
