<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Hornet: drone-swarm hive carrier — wasp black/yellow segments / amber honeycomb glow -->
    <linearGradient id="hoBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#424242"/>
      <stop offset="50%"  stop-color="#212121"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="hoYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffee58"/>
      <stop offset="55%"  stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <linearGradient id="hoSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#bdbdbd" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#424242" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="hoEng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#ffee58"/>
      <stop offset="65%"  stop-color="#ff8f00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hoCell" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fff59d"/>
      <stop offset="50%"  stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#7a4f00"/>
    </radialGradient>
    <radialGradient id="hoEye" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#fff59d"/>
      <stop offset="50%"  stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
    <filter id="hoBlur"><feGaussianBlur stdDeviation="3.5"/></filter>
    <filter id="hoGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Twin amber thrusters -->
  <ellipse cx="12" cy="52" rx="22" ry="9" fill="url(#hoEng)" filter="url(#hoBlur)"/>
  <ellipse cx="12" cy="76" rx="22" ry="9" fill="url(#hoEng)" filter="url(#hoBlur)"/>

  <!-- Segmented hive body — three bulging abdomen segments joined by thin waists -->
  <!-- Rear segment -->
  <ellipse cx="56" cy="64" rx="34" ry="30" fill="url(#hoBody)" stroke="#000" stroke-width="0.6"/>
  <ellipse cx="56" cy="64" rx="34" ry="30" fill="url(#hoSheen)"/>
  <!-- Mid segment -->
  <ellipse cx="120" cy="64" rx="32" ry="27" fill="url(#hoBody)" stroke="#000" stroke-width="0.6"/>
  <ellipse cx="120" cy="64" rx="32" ry="27" fill="url(#hoSheen)"/>
  <!-- Front segment (thorax) -->
  <ellipse cx="180" cy="64" rx="26" ry="22" fill="url(#hoBody)" stroke="#000" stroke-width="0.6"/>
  <ellipse cx="180" cy="64" rx="26" ry="22" fill="url(#hoSheen)"/>
  <!-- Connecting waists -->
  <rect x="84" y="56" width="14" height="16" rx="3" fill="#212121"/>
  <rect x="146" y="56" width="12" height="16" rx="3" fill="#212121"/>

  <!-- Wasp warning bands (yellow stripes on each segment) -->
  <path d="M40,38 A34,30 0 0 0 40,90 L48,90 A30,26 0 0 1 48,38 Z" fill="url(#hoYellow)" opacity="0.92"/>
  <path d="M64,37 A30,27 0 0 0 64,91 L72,91 A26,23 0 0 1 72,37 Z" fill="url(#hoYellow)" opacity="0.92"/>
  <path d="M108,40 A30,26 0 0 0 108,88 L116,88 A26,22 0 0 1 116,40 Z" fill="url(#hoYellow)" opacity="0.92"/>
  <path d="M130,40 A28,25 0 0 0 130,88 L138,88 A24,21 0 0 1 138,40 Z" fill="url(#hoYellow)" opacity="0.92"/>

  <!-- Honeycomb drone launch cells (hexagon grid on rear segment) -->
  <g stroke="#3e2723" stroke-width="0.5">
    <polygon points="44,52 49,55 49,61 44,64 39,61 39,55" fill="url(#hoCell)"/>
    <polygon points="44,66 49,69 49,75 44,78 39,75 39,69" fill="url(#hoCell)"/>
    <polygon points="56,52 61,55 61,61 56,64 51,61 51,55" fill="url(#hoCell)"/>
    <polygon points="56,66 61,69 61,75 56,78 51,75 51,69" fill="url(#hoCell)"/>
    <polygon points="50,59 55,62 55,68 50,71 45,68 45,62" fill="url(#hoCell)"/>
    <polygon points="68,59 73,62 73,68 68,71 63,68 63,62" fill="url(#hoCell)"/>
  </g>
  <!-- Cell inner glow -->
  <g filter="url(#hoGlow)" fill="#fff59d" opacity="0.8">
    <circle cx="44" cy="58" r="1.4"/><circle cx="56" cy="58" r="1.4"/>
    <circle cx="50" cy="65" r="1.4"/><circle cx="44" cy="72" r="1.4"/>
  </g>

  <!-- Hive lattice seams across mid segment -->
  <g stroke="#fdd835" stroke-width="0.4" opacity="0.4">
    <line x1="100" y1="50" x2="140" y2="50"/>
    <line x1="96" y1="64" x2="144" y2="64"/>
    <line x1="100" y1="78" x2="140" y2="78"/>
  </g>

  <!-- Released drones (small wedge shapes scattered ahead) -->
  <g fill="#fdd835" stroke="#3e2723" stroke-width="0.4">
    <polygon points="214,40 222,38 224,41 222,44 214,42"/>
    <polygon points="230,52 238,50 240,53 238,56 230,54"/>
    <polygon points="220,86 228,84 230,87 228,90 220,88"/>
    <polygon points="240,72 248,70 250,73 248,76 240,74"/>
  </g>
  <g fill="#ff8f00" filter="url(#hoGlow)">
    <circle cx="214" cy="41" r="0.9"/><circle cx="230" cy="53" r="0.9"/>
    <circle cx="220" cy="87" r="0.9"/><circle cx="240" cy="73" r="0.9"/>
  </g>

  <!-- Compound-eye sensor cluster (front of thorax) -->
  <ellipse cx="196" cy="58" rx="8" ry="6" fill="url(#hoEye)" stroke="#3e2723" stroke-width="0.5"/>
  <ellipse cx="196" cy="72" rx="7" ry="5" fill="url(#hoEye)" stroke="#3e2723" stroke-width="0.5"/>
  <g stroke="#7a3500" stroke-width="0.4" opacity="0.6">
    <line x1="190" y1="58" x2="202" y2="58"/><line x1="196" y1="53" x2="196" y2="63"/>
  </g>

  <!-- Twin engine nozzles -->
  <rect x="14" y="44" width="16" height="14" rx="2" fill="#000" stroke="#424242" stroke-width="1"/>
  <rect x="14" y="70" width="16" height="14" rx="2" fill="#000" stroke="#424242" stroke-width="1"/>
  <ellipse cx="22" cy="51" rx="5" ry="5" fill="url(#hoEng)"/>
  <ellipse cx="22" cy="77" rx="5" ry="5" fill="url(#hoEng)"/>
  <rect x="14" y="42" width="18" height="2" fill="url(#hoYellow)"/>
  <rect x="14" y="84" width="18" height="2" fill="url(#hoYellow)"/>

  <!-- ── WEAPON — extending stinger lance + venom turret (front) ── -->
  <!-- Stinger lance -->
  <polygon points="206,60 250,63 256,64 250,65 206,68" fill="url(#hoYellow)" stroke="#7a4f00" stroke-width="0.5"/>
  <polygon points="244,63 256,64 244,65" fill="#fff59d"/>
  <!-- Venom charge glow at tip -->
  <circle cx="252" cy="64" r="2.6" fill="url(#hoEng)" filter="url(#hoGlow)"/>
  <!-- Twin stinger barbs flanking the lance -->
  <polygon points="206,54 230,50 232,53 208,58" fill="#212121" stroke="#fdd835" stroke-width="0.4"/>
  <polygon points="206,74 230,78 232,75 208,70" fill="#212121" stroke="#fdd835" stroke-width="0.4"/>
</svg>
