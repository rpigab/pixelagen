<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Marauder: pirate gunship — rusted steel / blood red / tarnished brass, asymmetric salvage -->
    <linearGradient id="marHull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3e2723"/>
      <stop offset="40%"  stop-color="#5d4037"/>
      <stop offset="75%"  stop-color="#795548"/>
      <stop offset="100%" stop-color="#a1887f"/>
    </linearGradient>
    <linearGradient id="marSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#78909c"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="marRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e53935"/>
      <stop offset="55%"  stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#5d0000"/>
    </linearGradient>
    <linearGradient id="marBrass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd54f"/>
      <stop offset="50%"  stop-color="#c89b3c"/>
      <stop offset="100%" stop-color="#6d4c1b"/>
    </linearGradient>
    <linearGradient id="marSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d7ccc8" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#795548" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0f0a" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="marEng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff59d"/>
      <stop offset="30%"  stop-color="#ff8f00"/>
      <stop offset="65%"  stop-color="#e53935" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5d0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="marCockpit" cx="32%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="45%"  stop-color="#ff8f00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3e2723" stop-opacity="0.95"/>
    </radialGradient>
    <filter id="marBlur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="marGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Sputtering mismatched engine plumes (uneven — salvage drives) -->
  <ellipse cx="12" cy="48" rx="26" ry="11" fill="url(#marEng)" filter="url(#marBlur)"/>
  <ellipse cx="8"  cy="82" rx="20" ry="8"  fill="url(#marEng)" filter="url(#marBlur)"/>

  <!-- Asymmetric cobbled hull (irregular profile) -->
  <polygon points="24,38 90,30 150,42 210,50 248,68 232,92 150,100 70,96 24,86" fill="url(#marHull)" stroke="#3e2723" stroke-width="0.7"/>
  <polygon points="24,38 90,30 150,42 210,50 248,68 232,92 150,100 70,96 24,86" fill="url(#marSheen)"/>

  <!-- Welded-on mismatched armor plates (salvaged from different ships) -->
  <polygon points="40,40 86,34 92,52 44,58" fill="url(#marSteel)" opacity="0.85" stroke="#263238" stroke-width="0.5"/>
  <polygon points="100,40 150,44 148,64 98,60" fill="url(#marRed)" opacity="0.7" stroke="#5d0000" stroke-width="0.5"/>
  <polygon points="60,66 120,70 118,92 62,90" fill="url(#marSteel)" opacity="0.7" stroke="#263238" stroke-width="0.5"/>
  <polygon points="160,52 206,56 210,76 162,78" fill="url(#marHull)" opacity="0.9" stroke="#3e2723" stroke-width="0.5"/>

  <!-- Rivet rows (rugged welding) -->
  <g fill="#d7ccc8" opacity="0.5">
    <circle cx="46" cy="42" r="1"/><circle cx="56" cy="41" r="1"/><circle cx="66" cy="40" r="1"/><circle cx="76" cy="39" r="1"/>
    <circle cx="104" cy="46" r="1"/><circle cx="116" cy="48" r="1"/><circle cx="128" cy="49" r="1"/><circle cx="140" cy="50" r="1"/>
    <circle cx="68" cy="88" r="1"/><circle cx="82" cy="89" r="1"/><circle cx="96" cy="90" r="1"/><circle cx="110" cy="90" r="1"/>
    <circle cx="170" cy="74" r="1"/><circle cx="184" cy="74" r="1"/><circle cx="198" cy="73" r="1"/>
  </g>
  <!-- Rust streaks -->
  <line x1="92" y1="34" x2="90" y2="52" stroke="#bf5a36" stroke-width="1.4" opacity="0.4"/>
  <line x1="150" y1="44" x2="148" y2="62" stroke="#bf5a36" stroke-width="1.4" opacity="0.4"/>
  <line x1="120" y1="70" x2="118" y2="90" stroke="#8d4a2f" stroke-width="1.2" opacity="0.4"/>

  <!-- Brass trim band -->
  <polyline points="24,86 70,96 150,100 232,92 248,68" fill="none" stroke="url(#marBrass)" stroke-width="1.6" opacity="0.8"/>

  <!-- Jolly-Roger style skull decal (red plate) -->
  <g transform="translate(120,52)" fill="#f5f5f5" opacity="0.85">
    <circle cx="0" cy="0" r="5"/>
    <circle cx="-1.8" cy="-0.6" r="1.2" fill="#3e2723"/>
    <circle cx="1.8" cy="-0.6" r="1.2" fill="#3e2723"/>
    <rect x="-2" y="2.6" width="4" height="2" fill="#3e2723"/>
    <rect x="-7" y="4" width="14" height="1.6" transform="rotate(20)" />
    <rect x="-7" y="4" width="14" height="1.6" transform="rotate(-20)" />
  </g>

  <!-- Cockpit (cracked, off-center) -->
  <polygon points="196,54 224,58 220,68 194,66" fill="url(#marCockpit)" stroke="#c89b3c" stroke-width="0.8"/>
  <line x1="206" y1="55" x2="208" y2="67" stroke="#3e2723" stroke-width="0.7" opacity="0.7"/>
  <line x1="198" y1="56" x2="218" y2="60" stroke="#ffe082" stroke-width="0.4" opacity="0.5"/>

  <!-- Jagged ram prow -->
  <polygon points="232,60 248,68 232,76 238,68" fill="url(#marSteel)" stroke="#263238" stroke-width="0.6"/>
  <polygon points="244,64 256,66 248,70" fill="url(#marBrass)"/>

  <!-- Mismatched engine nozzles -->
  <rect x="14" y="40" width="18" height="18" rx="2" fill="#1a0f0a" stroke="#5d4037" stroke-width="1"/>
  <ellipse cx="23" cy="49" rx="7" ry="7" fill="url(#marEng)"/>
  <rect x="12" y="74" width="14" height="14" rx="2" fill="#1a0f0a" stroke="#37474f" stroke-width="1"/>
  <ellipse cx="19" cy="81" rx="5" ry="5" fill="url(#marEng)"/>
  <!-- Exhaust soot/smoke vents -->
  <circle cx="30" cy="64" r="2" fill="#212121" opacity="0.6"/>
  <circle cx="38" cy="60" r="1.5" fill="#212121" opacity="0.5"/>

  <!-- ── WEAPONS — bolted-on heavy harpoon cannon + scrap autocannons ── -->
  <!-- Big harpoon / grappling cannon (top mount) -->
  <rect x="150" y="30" width="26" height="12" rx="2" fill="url(#marSteel)" stroke="#263238" stroke-width="0.7"/>
  <rect x="174" y="33" width="40" height="4" rx="1" fill="#455a64"/>
  <polygon points="214,31 226,35 214,39" fill="url(#marBrass)" stroke="#5d4c1b" stroke-width="0.4"/>
  <line x1="218" y1="35" x2="226" y2="33" stroke="#a1887f" stroke-width="0.6"/>
  <line x1="218" y1="35" x2="226" y2="37" stroke="#a1887f" stroke-width="0.6"/>
  <!-- Twin scrap autocannons (front) -->
  <rect x="206" y="78" width="14" height="10" rx="2" fill="url(#marSteel)" stroke="#263238" stroke-width="0.6"/>
  <rect x="218" y="79" width="36" height="2.6" rx="0.8" fill="#607d8b"/>
  <rect x="218" y="83" width="38" height="2.6" rx="0.8" fill="#78909c"/>
  <rect x="252" y="79" width="3" height="2.6" fill="#ff8f00" filter="url(#marGlow)"/>
  <rect x="254" y="83" width="3" height="2.6" fill="#ff8f00" filter="url(#marGlow)"/>
  <!-- Ventral mortar tube -->
  <rect x="120" y="94" width="20" height="8" rx="2" fill="url(#marSteel)" stroke="#263238" stroke-width="0.6"/>
  <ellipse cx="122" cy="98" rx="3" ry="3" fill="#1a0f0a"/>
  <rect x="136" y="96" width="6" height="4" rx="1" fill="url(#marRed)"/>
</svg>
