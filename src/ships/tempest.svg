<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <!-- Tempest: plasma destroyer — dark-chrome hull / electric blue energy / magenta plasma core -->
    <linearGradient id="teHull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d0f1a"/>
      <stop offset="40%"  stop-color="#1a1f3a"/>
      <stop offset="75%"  stop-color="#34406e"/>
      <stop offset="100%" stop-color="#7986cb"/>
    </linearGradient>
    <linearGradient id="teSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c5cae9" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#34406e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060d" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="teWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#283593"/>
      <stop offset="100%" stop-color="#0a0e24"/>
    </linearGradient>
    <radialGradient id="teCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#e040fb"/>
      <stop offset="55%"  stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#311b92" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teEng" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="28%"  stop-color="#18ffff"/>
      <stop offset="62%"  stop-color="#2979ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a237e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="teArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#18ffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#18ffff"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
    <radialGradient id="teCockpit" cx="35%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#e1f5fe"/>
      <stop offset="45%"  stop-color="#7c4dff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a0a3a" stop-opacity="0.95"/>
    </radialGradient>
    <filter id="teBlur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="teGlow"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Big plasma engine bloom (dual, cyan→magenta) -->
  <ellipse cx="10" cy="52" rx="32" ry="11" fill="url(#teEng)" filter="url(#teBlur)"/>
  <ellipse cx="10" cy="76" rx="32" ry="11" fill="url(#teEng)" filter="url(#teBlur)"/>

  <!-- Swept energy fins (top + bottom) -->
  <polygon points="108,52 56,16 30,8 36,28 78,44 92,54" fill="url(#teWing)" stroke="#0a0e24" stroke-width="0.5"/>
  <polygon points="108,52 56,16 30,8 36,28 78,44 92,54" fill="url(#teSheen)"/>
  <polygon points="108,76 56,112 30,120 36,100 78,84 92,74" fill="url(#teWing)" stroke="#0a0e24" stroke-width="0.5"/>
  <polygon points="108,76 56,112 30,120 36,100 78,84 92,74" fill="url(#teSheen)"/>
  <!-- Energy-charged fin edges -->
  <polyline points="30,8 78,44 92,54" fill="none" stroke="url(#teArc)" stroke-width="1.3" filter="url(#teGlow)"/>
  <polyline points="30,120 78,84 92,74" fill="none" stroke="url(#teArc)" stroke-width="1.3" filter="url(#teGlow)"/>

  <!-- Main hull (sleek dart with a hollow energy channel) -->
  <polygon points="24,52 96,54 170,58 252,64 170,70 96,74 24,76" fill="url(#teHull)" stroke="#34406e" stroke-width="0.5"/>
  <polygon points="24,52 96,54 170,58 252,64 170,70 96,74 24,76" fill="url(#teSheen)"/>

  <!-- Exposed central plasma conduit (glowing core running the length) -->
  <rect x="60" y="61" width="150" height="6" rx="3" fill="#0a0e24"/>
  <rect x="60" y="62" width="150" height="4" rx="2" fill="url(#teArc)" opacity="0.85" filter="url(#teGlow)"/>
  <!-- Pulsing core nodes along the conduit -->
  <g filter="url(#teGlow)">
    <circle cx="80"  cy="64" r="2.6" fill="#18ffff"/>
    <circle cx="116" cy="64" r="3"   fill="#7c4dff"/>
    <circle cx="152" cy="64" r="2.6" fill="#e040fb"/>
    <circle cx="188" cy="64" r="2.4" fill="#18ffff"/>
  </g>

  <!-- Energy ribs branching off the conduit -->
  <g stroke="#18ffff" stroke-width="0.5" opacity="0.4" filter="url(#teGlow)">
    <line x1="90"  y1="61" x2="90"  y2="56"/><line x1="90"  y1="67" x2="90"  y2="72"/>
    <line x1="128" y1="61" x2="128" y2="56"/><line x1="128" y1="67" x2="128" y2="72"/>
    <line x1="166" y1="61" x2="166" y2="58"/><line x1="166" y1="67" x2="166" y2="70"/>
  </g>

  <!-- Dark panel facets -->
  <polygon points="96,54 170,58 170,62 96,60" fill="#1a1f3a" opacity="0.7"/>
  <polygon points="96,74 170,70 170,66 96,68" fill="#0a0e18" opacity="0.7"/>
  <line x1="70"  y1="53" x2="70"  y2="75" stroke="#7986cb" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="56" x2="130" y2="72" stroke="#7986cb" stroke-width="0.5" opacity="0.3"/>
  <line x1="190" y1="58" x2="190" y2="70" stroke="#7986cb" stroke-width="0.5" opacity="0.25"/>

  <!-- Cockpit (energy canopy, forward) -->
  <polygon points="196,58 222,62 216,69 194,67" fill="url(#teCockpit)" stroke="#7c4dff" stroke-width="0.7"/>
  <line x1="198" y1="60" x2="216" y2="63.5" stroke="#e1f5fe" stroke-width="0.4" opacity="0.5"/>

  <!-- Sharp ionized nose -->
  <polygon points="244,61 256,64 244,67" fill="#18ffff" filter="url(#teGlow)"/>

  <!-- Dual plasma engine nozzles with containment rings -->
  <rect x="14" y="46" width="18" height="12" rx="3" fill="#05060d" stroke="#2979ff" stroke-width="1"/>
  <rect x="14" y="70" width="18" height="12" rx="3" fill="#05060d" stroke="#2979ff" stroke-width="1"/>
  <ellipse cx="23" cy="52" rx="6" ry="5" fill="url(#teEng)"/>
  <ellipse cx="23" cy="76" rx="6" ry="5" fill="url(#teEng)"/>
  <ellipse cx="23" cy="52" rx="6" ry="5" fill="none" stroke="#e040fb" stroke-width="0.9" opacity="0.7" filter="url(#teGlow)"/>
  <ellipse cx="23" cy="76" rx="6" ry="5" fill="none" stroke="#e040fb" stroke-width="0.9" opacity="0.7" filter="url(#teGlow)"/>

  <!-- ── WEAPONS — twin particle-beam projectors fed from the core ── -->
  <!-- Upper projector -->
  <rect x="204" y="54" width="14" height="8" rx="2" fill="url(#teWing)" stroke="#283593" stroke-width="0.6"/>
  <rect x="216" y="56" width="40" height="2.4" rx="0.8" fill="#34406e"/>
  <rect x="216" y="56.4" width="40" height="1.4" fill="#18ffff" opacity="0.7" filter="url(#teGlow)"/>
  <rect x="254" y="55" width="3" height="4" rx="0.5" fill="#18ffff" filter="url(#teGlow)"/>
  <!-- Lower projector -->
  <rect x="204" y="66" width="14" height="8" rx="2" fill="url(#teWing)" stroke="#283593" stroke-width="0.6"/>
  <rect x="216" y="69" width="40" height="2.4" rx="0.8" fill="#34406e"/>
  <rect x="216" y="69.4" width="40" height="1.4" fill="#e040fb" opacity="0.7" filter="url(#teGlow)"/>
  <rect x="254" y="68" width="3" height="4" rx="0.5" fill="#e040fb" filter="url(#teGlow)"/>
  <!-- Wing-tip plasma orbs -->
  <circle cx="31" cy="9" r="2.4" fill="#18ffff" filter="url(#teGlow)"/>
  <circle cx="31" cy="119" r="2.4" fill="#e040fb" filter="url(#teGlow)"/>
</svg>
